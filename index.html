<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Messenger Ultra | XQ Studio Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --xq-bg: #050608; --xq-side: #0e1117; --xq-primary: #5865f2;
            --xq-accent: #00ff9d; --xq-text: #e1e1e1; --xq-glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--xq-bg); color: var(--xq-text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* AUTH UI */
        .auth-container { width: 100%; max-width: 480px; padding: 40px; background: var(--xq-side); border-radius: 30px; border: 1px solid var(--xq-glass); text-align: center; position: relative; }
        .logo-area h1 { font-weight: 900; font-size: 2.5rem; background: linear-gradient(90deg, var(--xq-primary), var(--xq-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .legal-scroll { background: #000; height: 150px; overflow-y: auto; padding: 15px; border-radius: 15px; border: 1px solid #1f232c; font-size: 0.8rem; text-align: left; margin: 20px 0; color: #8b949e; line-height: 1.5; }
        .xq-input { width: 100%; background: #000; border: 1px solid #2d3436; color: #fff; padding: 16px; border-radius: 14px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .xq-input:focus { border-color: var(--xq-primary); }
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--xq-primary), #a052ff); color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed; }

        /* APP UI */
        #appFrame { display: none; width: 100%; height: 100vh; flex-direction: column; background: #000; }
        .main-chat { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 70%; font-size: 0.9rem; background: var(--xq-side); align-self: flex-start; }
        .msg-me { align-self: flex-end; background: var(--xq-primary); }
        .input-bar { padding: 20px; background: var(--xq-side); display: flex; gap: 10px; border-top: 1px solid var(--xq-glass); }
    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <div class="logo-area"><h1>XQ ULTRA</h1><p>Siber Denetimli Güvenli Mesajlaşma</p></div>
        <div class="legal-scroll">
            <b>T.C. ANAYASA & SİBER GÜVENLİK:</b><br><br>
            TCK ilgili maddeleri gereği; terör, darbe ve taciz içerikleri yasaktır. İhlaller <b>bro635756@gmail.com</b> adresine raporlanır.
        </div>
        <input type="checkbox" id="legalCheck"> Maddeleri onaylıyorum.
        <input type="email" id="userEmail" class="xq-input" placeholder="E-posta" style="margin-top:15px;">
        <button class="btn-main" id="otpBtn" disabled onclick="sendOTP()">9 HANELİ KOD GÖNDER</button>
        <div id="verifyArea" style="display:none; margin-top:15px;">
            <input type="number" id="otpInput" class="xq-input" placeholder="000 000 000">
            <button class="btn-main" onclick="verifyAccess()">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="appFrame">
        <div class="main-chat" id="chatBox"></div>
        <div class="input-bar">
            <input type="text" id="chatInput" class="xq-input" style="margin:0" placeholder="Mesaj yazın...">
            <button class="btn-main" style="width:100px" onclick="submitMessage()">GÖNDER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBQdsC8VuoBnFyOLWavV3C8GXomSzDXUzw", 
            databaseURL: "https://des-store-c93e0-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const RESEND_KEY = "re_29BPLbT4_CA6DrRuvHfAK2f7XJgiarAfR";
        const SPOTIFY_ID = "1a5def3fab8142a79a1d48cd7c260751";
        let validOTP = "";
        let currentMail = "";

        document.getElementById('legalCheck').onchange = (e) => document.getElementById('otpBtn').disabled = !e.target.checked;

        window.sendOTP = async () => {
            currentMail = document.getElementById('userEmail').value;
            validOTP = Math.floor(100000000 + Math.random() * 900000000).toString();
            
            try {
                const res = await fetch('https://api.resend.com/emails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${RESEND_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: 'XQ-Auth <onboarding@resend.dev>',
                        to: [currentMail],
                        subject: 'XQ Güvenlik Kodu',
                        html: `Giriş kodunuz: <b>${validOTP}</b>`
                    })
                });
                if(res.ok) { document.getElementById('verifyArea').style.display = 'block'; alert("Kod gönderildi!"); }
                else { throw new Error("Fetch failed"); }
            } catch (e) { alert("Hata: Firebase/Resend domain izni eksik olabilir."); }
        };

        window.verifyAccess = () => {
            if(document.getElementById('otpInput').value === validOTP) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('appFrame').style.display = 'flex';
                initChat();
            }
        };

        async function audit(msg) {
            const bad = ["terör", "darbe", "taciz"];
            if(bad.some(w => msg.toLowerCase().includes(w))) {
                await fetch('https://api.resend.com/emails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${RESEND_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: 'Denetim@resend.dev', to: ['bro635756@gmail.com'], subject: 'İHLAL', html: `Kullanıcı: ${currentMail}<br>Mesaj: ${msg}` })
                });
            }
        }

        window.submitMessage = () => {
            const txt = document.getElementById('chatInput').value;
            audit(txt);
            push(ref(db, 'messages'), { sender: currentMail, text: txt, time: Date.now() });
            document.getElementById('chatInput').value = "";
        };

        function initChat() {
            onValue(ref(db, 'messages'), (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const m = document.createElement('div');
                    m.className = `msg ${d.sender === currentMail ? 'msg-me' : ''}`;
                    m.innerText = d.text;
                    box.appendChild(m);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
