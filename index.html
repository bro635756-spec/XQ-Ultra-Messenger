<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Messenger Ultra | XQ Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --xq-bg: #050608; --xq-side: #0e1117; --xq-primary: #5865f2; --xq-accent: #00ff9d; --xq-text: #e1e1e1; }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--xq-bg); color: var(--xq-text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* AUTH UI */
        .auth-card { background: var(--xq-side); padding: 40px; border-radius: 25px; width: 95%; max-width: 500px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .legal-box { background: #000; padding: 15px; border-radius: 12px; height: 200px; overflow-y: auto; font-size: 0.85rem; text-align: left; margin: 20px 0; border: 1px solid #1f232c; color: #8b949e; line-height: 1.6; }
        .xq-input { width: 100%; background: #000; border: 1px solid #2d3436; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 1rem; }
        .btn-xq { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #5865f2, #a052ff); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-xq:disabled { opacity: 0.3; cursor: not-allowed; }

        /* APP UI */
        #mainApp { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #080a0f; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 75%; font-size: 0.95rem; background: var(--xq-side); align-self: flex-start; }
        .me { align-self: flex-end; background: var(--xq-primary); }
        .controls { padding: 20px; background: var(--xq-side); display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="auth-card" id="authSection">
        <h1 style="background: linear-gradient(90deg, #5865f2, #00ff9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">XQ ULTRA</h1>
        <div class="legal-box" id="legalContent">
            <b>T.C. ANAYASA VE SİBER GÜVENLİK BİLDİRİMİ:</b><br><br>
            İşbu uygulama XQ Studio bünyesinde geliştirilmiştir. TCK ve Anayasa'nın ilgili maddeleri gereği; terör, darbe, saldırı ve taciz içerikli tüm yazışmalar <b>bro635756@gmail.com</b> adresine raporlanmaktadır.
        </div>
        <label style="display:block; margin-bottom:15px; cursor:pointer; font-size:0.9rem;">
            <input type="checkbox" id="accept"> Şartları ve siber denetimi onaylıyorum.
        </label>
        <input type="email" id="email" class="xq-input" placeholder="E-posta adresiniz">
        <button class="btn-xq" id="sendBtn" disabled onclick="sendCode()">9 HANELİ KOD GÖNDER</button>
        
        <div id="otpArea" style="display:none; margin-top:20px;">
            <input type="number" id="otp" class="xq-input" placeholder="000 000 000">
            <button class="btn-xq" onclick="verify()">SİSTEME GİRİŞ</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="chat-area" id="chat"></div>
        <div class="controls">
            <input type="text" id="msg" class="xq-input" style="margin:0" placeholder="Mesaj... (Spotify ve Denetçi Aktif)">
            <button class="btn-xq" style="width:100px" onclick="sendMessage()">GÖNDER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBQdsC8VuoBnFyOLWavV3C8GXomSzDXUzw", 
            databaseURL: "https://des-store-c93e0-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const SPOTIFY_ID = '1a5def3fab8142a79a1d48cd7c260751';
        const RESEND_KEY = 're_29BPLbT4_CA6DrRuvHfAK2f7XJgiarAfR';
        let generatedOTP = "";
        let userEmail = "";

        document.getElementById('accept').onchange = (e) => document.getElementById('sendBtn').disabled = !e.target.checked;

        window.sendCode = async () => {
            userEmail = document.getElementById('email').value;
            generatedOTP = Math.floor(100000000 + Math.random() * 900000000).toString();
            
            await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${RESEND_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    from: 'XQ-Auth <onboarding@resend.dev>',
                    to: [userEmail],
                    subject: 'XQ Ultra Güvenlik Kodu',
                    html: `Kodunuz: <b>${generatedOTP}</b>. XQ Studio güvencesiyle.`
                })
            });
            document.getElementById('otpArea').style.display = 'block';
            alert("9 haneli kod mailinize gönderildi.");
        };

        window.verify = () => {
            if(document.getElementById('otp').value === generatedOTP) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                loadChat();
            }
        };

        async function siberDenetle(mesaj) {
            const yasakli = ["terör", "darbe", "saldırı", "tecavüz", "taciz"];
            if(yasakli.some(k => mesaj.toLowerCase().includes(k))) {
                await fetch('https://api.resend.com/emails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${RESEND_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from: 'SiberDenetci@resend.dev',
                        to: ['bro635756@gmail.com'],
                        subject: '⚠️ İHLAL TESPİTİ',
                        html: `<b>Kullanıcı:</b> ${userEmail}<br><b>Mesaj:</b> ${mesaj}`
                    })
                });
            }
        }

        window.sendMessage = () => {
            const val = document.getElementById('msg').value;
            siberDenetle(val);
            push(ref(db, 'messages'), { email: userEmail, text: val, time: Date.now() });
            document.getElementById('msg').value = "";
        };

        function loadChat() {
            onValue(ref(db, 'messages'), (snap) => {
                const chat = document.getElementById('chat');
                chat.innerHTML = "";
                snap.forEach(m => {
                    const data = m.val();
                    const div = document.createElement('div');
                    div.className = `msg ${data.email === userEmail ? 'me' : ''}`;
                    div.innerText = `${data.email.split('@')[0]}: ${data.text}`;
                    chat.appendChild(div);
                });
                chat.scrollTop = chat.scrollHeight;
            });
        }
    </script>
</body>
</html>
