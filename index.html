<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XQ Ultra | Server Management Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --xq-bg: #050608; --xq-side: #0e1117; --xq-primary: #5865f2; --xq-accent: #00ff9d; --xq-text: #e1e1e1; --xq-danger: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--xq-bg); color: var(--xq-text); height: 100vh; display: flex; overflow: hidden; }

        /* SERVER SIDEBAR */
        .server-bar { width: 72px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; border-right: 1px solid rgba(255,255,255,0.05); }
        .server-icon { width: 48px; height: 48px; background: var(--xq-side); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .server-icon:hover { border-radius: 15px; background: var(--xq-primary); }

        /* CHANNEL SIDEBAR */
        .channel-sidebar { width: 240px; background: var(--xq-side); display: flex; flex-direction: column; padding: 15px; }
        .channel-item { padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-bottom: 2px; color: #8e9297; transition: 0.2s; display: flex; justify-content: space-between; }
        .channel-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .channel-item.active { background: rgba(88, 101, 242, 0.2); color: #fff; }

        /* MAIN CONTENT */
        .main-app { flex: 1; display: flex; flex-direction: column; background: #36393f; }
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; background: var(--xq-bg); }
        .stream-area { display: none; height: 300px; background: #000; margin: 10px; border-radius: 10px; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI ELEMENTS */
        .input-box { padding: 20px; background: var(--xq-side); display: flex; gap: 10px; }
        .xq-input { flex: 1; background: #202225; border: none; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--xq-primary); color: #fff; }
        .btn-stream { background: var(--xq-accent); color: #000; }

        /* MODALS */
        #authOverlay { position: fixed; inset: 0; background: var(--xq-bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div style="text-align:center; width: 350px;">
            <h1 style="font-weight:900; font-size: 2.5rem;">XQ ULTRA</h1>
            <p style="color: #636e72; margin-bottom: 20px;">v8.0 Professional Edition</p>
            <input type="text" id="username" class="xq-input" style="width:100%; margin-bottom:10px;" placeholder="Kullanıcı Adı">
            <button class="btn btn-primary" style="width:100%;" onclick="startApp()">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <nav class="server-bar">
        <div class="server-icon" onclick="createServer()">+</div>
        <div id="serverList"></div>
    </nav>

    <aside class="channel-sidebar">
        <h3 id="serverTitle" style="font-size: 0.9rem; margin-bottom: 15px;">Sunucu Seçin</h3>
        <div style="font-size: 0.7rem; color: #72767d; margin-bottom: 5px;">METİN KANALLARI</div>
        <div id="textChannels"></div>
        
        <div style="font-size: 0.7rem; color: #72767d; margin: 15px 0 5px 0;">SES KANALLARI</div>
        <div id="voiceChannels"></div>

        <div style="margin-top:auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px;">
            <div id="meName" style="font-weight: bold; font-size: 0.8rem;"></div>
            <div id="meID" style="font-size: 0.6rem; color: var(--xq-accent);"></div>
            <button class="btn btn-stream" style="width:100%; margin-top:10px; font-size: 0.7rem;" onclick="toggleScreenShare()">EKRAN PAYLAŞ</button>
        </div>
    </aside>

    <main class="main-app">
        <div class="stream-area" id="streamContainer">
            <video id="localVideo" autoplay muted></video>
            <div style="position:absolute; top:10px; right:10px; background:red; padding:2px 8px; border-radius:5px; font-size:0.7rem;">CANLI</div>
        </div>
        <div class="chat-area" id="chatBox"></div>
        <div class="input-box">
            <input type="text" id="msgInput" class="xq-input" placeholder="Mesaj gönder...">
            <button class="btn btn-primary" onclick="sendMsg()">GÖNDER</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBQdsC8VuoBnFyOLWavV3C8GXomSzDXUzw", 
            databaseURL: "https://des-store-c93e0-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myData = { name: "", id: "" };
        let activeServer = "global_lobby";
        let activeChannel = "genel";
        let localStream = null;

        window.startApp = () => {
            const name = document.getElementById('username').value;
            if(!name) return;
            myData.name = name;
            myData.id = "xqm_" + Math.random().toString(36).substr(2, 9);
            document.getElementById('meName').innerText = name;
            document.getElementById('meID').innerText = myData.id;
            document.getElementById('authOverlay').style.display = 'none';
            initApp();
        };

        function initApp() {
            // Sunucu listesini dinle
            loadChannels();
            syncChat();
        }

        window.createServer = () => {
            const sName = prompt("Sunucu Adı:");
            if(sName) {
                const sID = "srv_" + Math.random().toString(36).substr(2, 5);
                set(ref(db, `servers/${sID}`), { name: sName, owner: myData.id });
                set(ref(db, `servers/${sID}/channels/genel`), { type: "text", private: false });
            }
        };

        function loadChannels() {
            const textZone = document.getElementById('textChannels');
            const voiceZone = document.getElementById('voiceChannels');
            
            // Örnek Sabit Kanallar
            textZone.innerHTML = `<div class="channel-item active" onclick="switchChannel('genel')"># genel</div>`;
            textZone.innerHTML += `<div class="channel-item" onclick="switchChannel('özel', true)">🔒 özel-şifreli</div>`;
            voiceZone.innerHTML = `<div class="channel-item" onclick="joinVoice('ses-1')">🔊 Ses Odası 1</div>`;
        }

        window.switchChannel = (name, isPrivate = false) => {
            if(isPrivate) {
                const pw = prompt("Oda Şifresi:");
                if(pw !== "1234") return alert("Hatalı Şifre!"); // Örnek şifre mantığı
            }
            activeChannel = name;
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            syncChat();
        };

        // EKRAN PAYLAŞIMI VE CANLI YAYIN
        window.toggleScreenShare = async () => {
            const container = document.getElementById('streamContainer');
            if(!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    document.getElementById('localVideo').srcObject = localStream;
                    container.style.display = 'block';
                    // Kick Sistemi Simülasyonu
                    push(ref(db, `chats/${activeChannel}`), { sender: "SİSTEM", text: `🚨 ${myData.name} yayına başladı!`, type: "system" });
                } catch (e) { console.error(e); }
            } else {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                container.style.display = 'none';
            }
        };

        // CHAT & KICK SİSTEMİ
        window.sendMsg = () => {
            const txt = document.getElementById('msgInput').value;
            if(!txt) return;

            // Kick Komutu (Sadece Owner/Mod için geliştirilebilir)
            if(txt.startsWith("/kick ")) {
                const target = txt.split(" ")[1];
                push(ref(db, `chats/${activeChannel}`), { sender: "SİSTEM", text: `🚫 ${target} sunucudan atıldı!`, type: "system" });
            } else {
                push(ref(db, `chats/${activeChannel}`), {
                    sender: myData.name,
                    text: txt,
                    timestamp: serverTimestamp()
                });
            }
            document.getElementById('msgInput').value = "";
        };

        function syncChat() {
            onValue(ref(db, `chats/${activeChannel}`), (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const div = document.createElement('div');
                    div.style.marginBottom = "8px";
                    div.innerHTML = `<b style="color:${d.type==='system'?'var(--xq-danger)':'var(--xq-primary)'}">${d.sender}:</b> ${d.text}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
